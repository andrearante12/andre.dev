<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andre Arante — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #0e0e15;
    --card: #14141c;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #e8e8f0;
    --muted: #6e6e88;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body.lb-open { overflow: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4; pointer-events: none; z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 40px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-left { display: flex; align-items: center; gap: 32px; }
  .nav-logo { font-family: var(--mono); font-size: 13px; color: var(--accent2); letter-spacing: 0.08em; text-decoration: none; }
  .nav-back { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .nav-back:hover { color: var(--text); }
  .nav-back::before { content: '←'; }
  .nav-title { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* HERO */
  .photo-hero {
    padding: 130px 80px 60px;
    position: relative; z-index: 1;
    border-bottom: 1px solid var(--border);
  }
  .hero-eyebrow {
    font-family: var(--mono); font-size: 11px; color: var(--accent2);
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .hero-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--accent2); display: block; }
  .photo-hero h1 {
    font-family: var(--display); font-size: clamp(48px, 7vw, 96px);
    font-weight: 800; letter-spacing: -0.03em; line-height: 0.95;
    margin-bottom: 24px;
  }
  .photo-hero h1 span { color: transparent; -webkit-text-stroke: 1.5px rgba(255,255,255,0.2); }
  .photo-hero p {
    font-size: 16px; color: var(--muted); max-width: 480px; line-height: 1.65;
    font-weight: 300;
  }
  .photo-count {
    margin-top: 32px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; display: flex; align-items: center; gap: 20px;
  }
  .photo-count span { display: flex; align-items: center; gap: 6px; }
  .photo-count span::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* FILTER BAR */
  .filter-bar {
    position: sticky; top: 60px; z-index: 50;
    background: rgba(10,10,15,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 80px;
    display: flex; align-items: center; gap: 4px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 18px 16px; border: none; background: transparent; color: var(--muted);
    cursor: pointer; transition: color 0.2s; white-space: nowrap; position: relative;
  }
  .filter-btn::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transition: transform 0.2s; }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { color: var(--text); }
  .filter-btn.active::after { transform: scaleX(1); }

  /* MASONRY GRID */
  .gallery-wrapper { padding: 48px 80px 80px; position: relative; z-index: 1; }

  .masonry {
    columns: 3;
    column-gap: 16px;
  }

  .photo-item {
    break-inside: avoid;
    margin-bottom: 16px;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    display: block;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .photo-item.hidden { display: none; }

  .photo-item img {
    width: 100%; display: block;
    transition: transform 0.4s ease;
  }

  .photo-item:hover img { transform: scale(1.03); }

  .photo-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
    opacity: 0; transition: opacity 0.3s ease;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 20px;
  }

  .photo-item:hover .photo-overlay { opacity: 1; }

  .photo-overlay-title {
    font-family: var(--display); font-size: 15px; font-weight: 700;
    color: #fff; line-height: 1.2; margin-bottom: 4px;
  }

  .photo-overlay-meta {
    font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }

  .photo-overlay-meta span { display: flex; align-items: center; gap: 4px; }

  /* PLACEHOLDER TILES (before real photos are added) */
  .photo-placeholder {
    width: 100%;
    background: var(--card);
    border: 1px dashed var(--border-hover);
    border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s;
    text-align: center;
    padding: 20px;
  }

  .photo-placeholder:hover { border-color: var(--accent); }

  .photo-placeholder .ph-icon { font-size: 22px; opacity: 0.3; }
  .photo-placeholder p { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; opacity: 0.35; line-height: 1.5; }
  .photo-placeholder .ph-label { font-family: var(--mono); font-size: 11px; color: var(--muted); opacity: 0.6; font-weight: 500; }

  /* empty state */
  .empty-state {
    display: none; text-align: center; padding: 80px 0;
    flex-direction: column; align-items: center; gap: 12px;
  }
  .empty-state.visible { display: flex; }
  .empty-state p { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.96);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(8px);
  }
  .lightbox.active { opacity: 1; pointer-events: all; }

  .lb-img-wrap {
    position: relative;
    max-width: min(90vw, 1100px);
    max-height: 85vh;
    display: flex; align-items: center; justify-content: center;
  }

  .lb-img-wrap img {
    max-width: 100%; max-height: 85vh;
    object-fit: contain; border-radius: 4px;
    user-select: none;
    transition: opacity 0.2s ease;
  }

  .lb-img-wrap img.fading { opacity: 0; }

  /* Close */
  .lb-close {
    position: fixed; top: 24px; right: 28px;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.5);
    color: rgba(255,255,255,0.7); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 301;
  }
  .lb-close:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

  /* Prev / Next */
  .lb-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.5);
    color: rgba(255,255,255,0.7); font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 301;
    user-select: none;
  }
  .lb-nav:hover { border-color: rgba(255,255,255,0.35); color: #fff; background: rgba(0,0,0,0.75); }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }
  .lb-nav:disabled { opacity: 0.2; cursor: default; pointer-events: none; }

  /* Caption */
  .lb-caption {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 20px 40px 28px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    display: flex; align-items: flex-end; justify-content: space-between;
    z-index: 301;
  }
  .lb-caption-left { display: flex; flex-direction: column; gap: 4px; }
  .lb-caption-title { font-family: var(--display); font-size: 18px; font-weight: 700; color: #fff; }
  .lb-caption-meta { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; }
  .lb-counter { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }

  /* FOOTER */
  .photo-footer {
    padding: 28px 80px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    position: relative; z-index: 1;
  }
  .photo-footer span { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .photo-footer a { color: var(--accent2); text-decoration: none; }
  .photo-footer a:hover { color: var(--text); }

  /* RESPONSIVE */
  @media (max-width: 1100px) { .masonry { columns: 2; } }
  @media (max-width: 900px) {
    nav, .filter-bar, .gallery-wrapper, .photo-footer { padding-left: 24px; padding-right: 24px; }
    .photo-hero { padding: 120px 24px 50px; }
    .lb-prev { left: 8px; } .lb-next { right: 8px; }
  }
  @media (max-width: 600px) {
    .masonry { columns: 1; }
    .lb-caption { padding: 16px 20px 20px; }
    .lb-caption-title { font-size: 15px; }
  }

  /* cursor dot */
  .cursor-dot {
    width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%); box-shadow: 0 0 12px var(--accent);
  }
</style>
</head>
<body>

<div class="cursor-dot" id="cursor"></div>

<nav>
  <div class="nav-left">
    <a class="nav-logo" href="index.html">aa.dev</a>
    <span class="nav-title">Photography</span>
  </div>
  <a class="nav-back" href="index.html">Portfolio</a>
</nav>

<div class="photo-hero">
  <p class="hero-eyebrow">Through the lens</p>
  <h1>Stills &amp;<br><span>Light</span></h1>
  <p>Street corners, facades, and the geometry hiding in plain sight. Shot across DC and beyond.</p>
  <div class="photo-count">
    <span id="total-count">0 photos</span>
    <span id="category-list"></span>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-filter="all" onclick="filterGallery('all', this)">All</button>
  <!-- Category buttons are injected by JS based on PHOTOS data -->
</div>

<!-- GALLERY -->
<div class="gallery-wrapper">
  <div class="masonry" id="masonry"></div>
  <div class="empty-state" id="empty-state">
    <span style="font-size:32px;opacity:0.2">◻</span>
    <p>No photos in this category yet.</p>
  </div>
</div>

<div class="photo-footer">
  <span>© 2026 Andre Arante · Photography</span>
  <span><a href="index.html">← Back to portfolio</a></span>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="lbClickOutside(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" id="lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-nav lb-next" id="lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-img-wrap">
    <img id="lb-img" src="" alt="">
  </div>
  <div class="lb-caption">
    <div class="lb-caption-left">
      <span class="lb-caption-title" id="lb-title"></span>
      <span class="lb-caption-meta" id="lb-meta"></span>
    </div>
    <span class="lb-counter" id="lb-counter"></span>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   PHOTO DATA
   ═══════════════════════════════════════════════
   HOW TO ADD YOUR OWN PHOTOS:
   Replace the placeholder entries below with real ones.
   Each photo object:
   {
     src:      "photos/my-shot.jpg",   ← path to your image file
     thumb:    "photos/my-shot.jpg",   ← can be same as src, or a smaller thumbnail
     title:    "Golden Hour",          ← shown on hover + lightbox caption
     location: "Washington, DC",       ← shown in lightbox caption
     category: "Street",               ← must match one of the filter buttons
     aspect:   "tall"                  ← "tall" | "wide" | "square" — controls masonry height
   }
   ═══════════════════════════════════════════════ */

const PHOTOS = [
  /* ── STREET / URBAN ──
     Tips: street portraits, candid moments, signs, reflections, shadows, night scenes.
     aspect: "tall" for portrait orientation, "wide" for landscape, "square" for 1:1 */
  { src: '', title: 'Street 01', location: 'Washington, DC', category: 'Street', aspect: 'tall', placeholder: true },
  { src: '', title: 'Street 02', location: 'Washington, DC', category: 'Street', aspect: 'wide', placeholder: true },
  { src: '', title: 'Street 03', location: 'Washington, DC', category: 'Street', aspect: 'tall', placeholder: true },
  { src: '', title: 'Street 04', location: 'Washington, DC', category: 'Street', aspect: 'square', placeholder: true },
  { src: '', title: 'Street 05', location: 'Washington, DC', category: 'Street', aspect: 'wide', placeholder: true },
  { src: '', title: 'Street 06', location: 'Washington, DC', category: 'Street', aspect: 'tall', placeholder: true },

  /* ── ARCHITECTURE ──
     Tips: facades, interiors, geometric details, leading lines, symmetry, dusk/blue-hour shots. */
  { src: '', title: 'Architecture 01', location: 'Washington, DC', category: 'Architecture', aspect: 'tall', placeholder: true },
  { src: '', title: 'Architecture 02', location: 'Washington, DC', category: 'Architecture', aspect: 'wide', placeholder: true },
  { src: '', title: 'Architecture 03', location: 'Washington, DC', category: 'Architecture', aspect: 'square', placeholder: true },
  { src: '', title: 'Architecture 04', location: 'Washington, DC', category: 'Architecture', aspect: 'tall', placeholder: true },
  { src: '', title: 'Architecture 05', location: 'Washington, DC', category: 'Architecture', aspect: 'wide', placeholder: true },
  { src: '', title: 'Architecture 06', location: 'Washington, DC', category: 'Architecture', aspect: 'tall', placeholder: true },
];

/* Aspect ratio → pixel heights for placeholders */
const ASPECT_H = { tall: 360, square: 240, wide: 180 };

/* ── Build category list from data ── */
const categories = ['all', ...new Set(PHOTOS.map(p => p.category))];

/* Inject filter buttons */
const filterBar = document.getElementById('filter-bar');
categories.slice(1).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = cat;
  btn.textContent = cat;
  btn.onclick = () => filterGallery(cat, btn);
  filterBar.appendChild(btn);
});

/* Update photo count and category list */
document.getElementById('total-count').textContent = PHOTOS.length + ' photos';
const realPhotos = PHOTOS.filter(p => !p.placeholder);
if (realPhotos.length > 0) {
  document.getElementById('category-list').textContent = categories.slice(1).join(' · ');
}

/* ── Build masonry grid ── */
const masonry = document.getElementById('masonry');
let currentFilter = 'all';

PHOTOS.forEach((photo, i) => {
  const item = document.createElement('div');
  item.className = 'photo-item';
  item.dataset.category = photo.category;
  item.dataset.index = i;
  item.onclick = () => openLightbox(i);

  if (photo.placeholder) {
    const h = ASPECT_H[photo.aspect] || 240;
    item.innerHTML = `
      <div class="photo-placeholder" style="height:${h}px">
        <span class="ph-icon">◻</span>
        <span class="ph-label">${photo.title}</span>
        <p>${photo.category} · ${photo.aspect}<br><span style="opacity:.35">Replace src in PHOTOS array</span></p>
      </div>`;
  } else {
    item.innerHTML = `
      <img src="${photo.src}" alt="${photo.title}" loading="lazy">
      <div class="photo-overlay">
        <div class="photo-overlay-title">${photo.title}</div>
        <div class="photo-overlay-meta">
          <span>${photo.category}</span>
          ${photo.location ? `<span>${photo.location}</span>` : ''}
        </div>
      </div>`;
  }

  masonry.appendChild(item);
});

/* ── Filter ── */
function filterGallery(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const items = document.querySelectorAll('.photo-item');
  let visible = 0;
  items.forEach(item => {
    const match = cat === 'all' || item.dataset.category === cat;
    item.classList.toggle('hidden', !match);
    if (match) visible++;
  });

  document.getElementById('empty-state').classList.toggle('visible', visible === 0);
}

/* ── Lightbox ── */
let lbIndex = 0;
let lbFiltered = [];

function getFilteredPhotos() {
  return currentFilter === 'all'
    ? PHOTOS
    : PHOTOS.filter(p => p.category === currentFilter);
}

function openLightbox(globalIdx) {
  lbFiltered = getFilteredPhotos();
  const photo = PHOTOS[globalIdx];
  lbIndex = lbFiltered.indexOf(photo);
  if (lbIndex === -1) { lbFiltered = PHOTOS; lbIndex = globalIdx; }
  renderLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.classList.add('lb-open');
}

function renderLightbox() {
  const photo = lbFiltered[lbIndex];
  const img = document.getElementById('lb-img');

  img.classList.add('fading');
  setTimeout(() => {
    img.src = photo.placeholder ? '' : photo.src;
    img.alt = photo.title;
    img.classList.remove('fading');
    if (photo.placeholder) {
      img.style.display = 'none';
      document.getElementById('lightbox').querySelector('.lb-img-wrap').innerHTML =
        `<div style="width:420px;max-width:90vw;height:300px;background:#14141c;border:1px dashed rgba(255,255,255,0.12);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,0.3)">
          <span style="font-size:36px;opacity:0.25">◻</span>
          <span style="font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em">${photo.title}</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;opacity:.4">Add your photo to the PHOTOS array</span>
        </div>`;
    }
  }, 120);

  document.getElementById('lb-title').textContent = photo.title;
  document.getElementById('lb-meta').textContent = [photo.category, photo.location].filter(Boolean).join(' · ');
  document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${lbFiltered.length}`;
  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex === lbFiltered.length - 1;
}

function lbNav(dir) {
  const next = lbIndex + dir;
  if (next < 0 || next >= lbFiltered.length) return;
  lbIndex = next;
  // Re-render img wrap if it was replaced with a placeholder div
  const wrap = document.getElementById('lightbox').querySelector('.lb-img-wrap');
  if (!wrap.querySelector('img')) {
    wrap.innerHTML = `<img id="lb-img" src="" alt="">`;
  }
  renderLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.classList.remove('lb-open');
}

function lbClickOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

/* cursor */
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
</script>
</body>
</html>
